name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile package and examples
        run: python -m compileall rinse examples
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Smoke test package core
        run: python -m rinse.core examples/rinse/sample_input.json
      - name: Smoke test compatibility wrapper
        run: python examples/rinse/rinse_core.py examples/rinse/sample_input.json
